name: Backup Streamlit Database

on:
  schedule:
    - cron: '0 2 * * *'   # 每天凌晨2点执行备份
  workflow_dispatch:       # 允许手动触发

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download database
        env:
          APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          # 创建备份目录
          mkdir -p backups
          # 生成带日期的文件名
          DATE=$(date +'%Y%m%d_%H%M%S')
          FILENAME="backups/makuake_${DATE}.db"
          # 下载数据库文件（直接访问下载接口）
          curl -L -o "$FILENAME" "${APP_URL}?download_db=1"
          echo "✅ 数据库已备份到 $FILENAME"

      - name: Commit and push backup
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add backups/
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily database backup"
          git push
